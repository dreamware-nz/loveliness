apiVersion: v1
kind: Service
metadata:
  name: loveliness
  namespace: loveliness
  labels:
    app: loveliness
spec:
  clusterIP: None
  selector:
    app: loveliness
  ports:
    - port: 8080
      name: http
    - port: 7687
      name: bolt
    - port: 9000
      name: raft
    - port: 9001
      name: transport
---
apiVersion: v1
kind: Service
metadata:
  name: loveliness-lb
  namespace: loveliness
  labels:
    app: loveliness
spec:
  type: LoadBalancer
  selector:
    app: loveliness
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 7687
      targetPort: 7687
      name: bolt
