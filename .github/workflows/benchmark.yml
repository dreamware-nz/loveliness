name: Benchmark

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      nodes:
        description: "Number of nodes to seed"
        default: "50000"
      edges:
        description: "Number of edges to seed"
        default: "50000"

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download
        env:
          GOFLAGS: -modcacherw

      - name: Install LadybugDB shared library
        run: |
          gh release download --repo LadybugDB/ladybug --pattern "liblbug-linux-x86_64.tar.gz" --dir /tmp/lbug --clobber
          tar xzf /tmp/lbug/liblbug-linux-x86_64.tar.gz -C /tmp/lbug liblbug.so
          sudo cp /tmp/lbug/liblbug.so /usr/local/lib/
          sudo ln -sf /usr/local/lib/liblbug.so /usr/local/lib/liblbug.so.0
          sudo ldconfig
          LBUG_DIR=$(go env GOMODCACHE)/github.com/\!ladybug\!d\!b/go-ladybug@v0.13.1/lib/dynamic/linux-amd64
          mkdir -p "$LBUG_DIR"
          ln -sf /usr/local/lib/liblbug.so "$LBUG_DIR/liblbug.so"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build benchmark binaries
        run: |
          CGO_ENABLED=1 go build -o bench/benchmark-runner ./cmd/benchmark
          CGO_ENABLED=1 go build -o bench/benchmark-charts ./cmd/benchmark-charts

      - name: Run benchmark suite
        run: |
          chmod +x bench/run.sh
          NODES=${{ github.event.inputs.nodes || '50000' }}
          EDGES=${{ github.event.inputs.edges || '50000' }}
          bench/run.sh --nodes="$NODES" --edges="$EDGES"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench/results/
        if: always()

      - name: Create benchmark PR
        if: success()
        run: |
          LATEST_DIR=$(ls -td bench/results/*/ 2>/dev/null | head -1)
          if [ -z "$LATEST_DIR" ]; then
            echo "No results directory found"
            exit 0
          fi

          # Update README performance section if markers exist.
          if grep -q "<!-- BENCHMARK_START -->" README.md; then
            # Generate the replacement content.
            COMPARISON="$LATEST_DIR/comparison.md"
            if [ -f "$COMPARISON" ]; then
              # Extract resource usage and key metrics for README.
              sed -i '/<!-- BENCHMARK_START -->/,/<!-- BENCHMARK_END -->/c\<!-- BENCHMARK_START -->\n'"$(cat "$COMPARISON")"'\n<!-- BENCHMARK_END -->' README.md
            fi
          fi

          # Commit and create PR.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="benchmark/update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add bench/results/ README.md
          git diff --cached --quiet && exit 0
          git commit -m "bench: update benchmark results

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push origin "$BRANCH"
          gh pr create \
            --title "bench: update benchmark results" \
            --body "Automated benchmark comparison results from CI.

          ## Contents
          - Loveliness (single node) vs Loveliness (3-node cluster) vs Neo4j CE
          - Latency, throughput, and memory comparison
          - SVG charts for visual comparison

          Generated by \`.github/workflows/benchmark.yml\`" \
            --base main
        env:
          GH_TOKEN: ${{ github.token }}
