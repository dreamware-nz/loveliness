name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download
        env:
          GOFLAGS: -modcacherw

      - name: Install LadybugDB shared library
        run: |
          gh release download --repo LadybugDB/ladybug --pattern "liblbug-linux-x86_64.tar.gz" --dir /tmp/lbug --clobber
          tar xzf /tmp/lbug/liblbug-linux-x86_64.tar.gz -C /tmp/lbug liblbug.so
          sudo cp /tmp/lbug/liblbug.so /usr/local/lib/
          sudo ln -sf /usr/local/lib/liblbug.so /usr/local/lib/liblbug.so.0
          sudo ldconfig
          LBUG_DIR=$(go env GOMODCACHE)/github.com/\!ladybug\!d\!b/go-ladybug@v0.13.1/lib/dynamic/linux-amd64
          mkdir -p "$LBUG_DIR"
          ln -sf /usr/local/lib/liblbug.so "$LBUG_DIR/liblbug.so"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        run: CGO_ENABLED=1 go build -o loveliness ./cmd/loveliness

      - name: Test
        run: go test ./pkg/... -count=1 -timeout 120s

      - name: Race detector
        run: go test ./pkg/... -race -count=1 -timeout 180s

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download
        env:
          GOFLAGS: -modcacherw

      - name: Install LadybugDB shared library
        run: |
          gh release download --repo LadybugDB/ladybug --pattern "liblbug-linux-x86_64.tar.gz" --dir /tmp/lbug --clobber
          tar xzf /tmp/lbug/liblbug-linux-x86_64.tar.gz -C /tmp/lbug liblbug.so
          sudo cp /tmp/lbug/liblbug.so /usr/local/lib/
          sudo ln -sf /usr/local/lib/liblbug.so /usr/local/lib/liblbug.so.0
          sudo ldconfig
          LBUG_DIR=$(go env GOMODCACHE)/github.com/\!ladybug\!d\!b/go-ladybug@v0.13.1/lib/dynamic/linux-amd64
          mkdir -p "$LBUG_DIR"
          ln -sf /usr/local/lib/liblbug.so "$LBUG_DIR/liblbug.so"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t loveliness:ci .
