name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Install LadybugDB shared library
        run: |
          LBUG_DIR=$(go env GOMODCACHE)/github.com/\!ladybug\!d\!b/go-ladybug@v0.13.1/lib/dynamic/linux-amd64
          mkdir -p "$LBUG_DIR" /tmp/lbug
          gh release download --repo LadybugDB/ladybug --pattern "liblbug-linux-x86_64.tar.gz" --dir /tmp/lbug --clobber
          tar xzf /tmp/lbug/liblbug-linux-x86_64.tar.gz -C "$LBUG_DIR" liblbug.so
          ls -la "$LBUG_DIR"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        run: CGO_ENABLED=1 go build -o loveliness ./cmd/loveliness

      - name: Test
        run: go test ./pkg/... -count=1 -timeout 120s

      - name: Race detector
        run: go test ./pkg/... -race -count=1 -timeout 180s

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Install LadybugDB shared library
        run: |
          LBUG_DIR=$(go env GOMODCACHE)/github.com/\!ladybug\!d\!b/go-ladybug@v0.13.1/lib/dynamic/linux-amd64
          mkdir -p "$LBUG_DIR" /tmp/lbug
          gh release download --repo LadybugDB/ladybug --pattern "liblbug-linux-x86_64.tar.gz" --dir /tmp/lbug --clobber
          tar xzf /tmp/lbug/liblbug-linux-x86_64.tar.gz -C "$LBUG_DIR" liblbug.so
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --go=1.24

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t loveliness:ci .
